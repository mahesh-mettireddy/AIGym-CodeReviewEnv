name: code_review_env
version: "1.0.0"
description: >
  An RL environment where AI agents learn to review Python code.
  Tasks range from bug detection (easy) to improvement suggestions (hard).
author: mahesh16
tags:
  - openenv
  - code-review
  - software-engineering
  - real-world
  - python

environment:
  class: CodeReviewEnvironment
  module: server.my_first_env_environment

tasks:
  - name: bug_detection
    difficulty: easy
    description: Identify whether a Python code snippet contains a bug
    reward_range: [0.01, 0.99]
    grader: server.graders.BugDetectionGrader

  - name: code_smell
    difficulty: medium
    description: Identify the code smell or bad practice in a snippet
    reward_range: [0.01, 0.99]
    grader: server.graders.CodeSmellGrader

  - name: improvement
    difficulty: hard
    description: Suggest a specific improvement to the code with reasoning
    reward_range: [0.01, 0.99]
    grader: server.graders.ImprovementGrader

action_space:
  type: CodeReviewAction
  fields:
    task: string
    verdict: string
    confidence: float

observation_space:
  type: CodeReviewObservation
  fields:
    task: string
    code_snippet: string
    instruction: string
    last_verdict: string
    last_reward: float
    done: boolean
    score: float
    feedback: string